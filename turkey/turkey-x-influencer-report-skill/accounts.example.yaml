# X/Twitter Influencer Watchlist for Turkey Investment
# Synced from: Turkey-investment/skills/x-influencer-market-monitor
# Copy to accounts.yaml, or set config.json → accounts_path.
#
# 拓展 / 删减（给 Agent 与同事）：
# - 新增：在 accounts: 下追加一项（至少 handle + enabled: true）
# - 删除：直接删掉该账号整块
# - 临时关闭：enabled: false（保留条目，不抓取）
# - 换名单文件：改 config.json 的 accounts_path 指向其他 yaml
# 字段：handle(必填), name, homepage, priority(high|medium|low), notes, enabled, tier, rank
# Last updated: 2026-07-09 — v0.4.0 core tier upgrade

defaults:
  timezone: Asia/Shanghai
  hours: 6
  per_account_limit: 40
  language_hint: mixed
  min_priority: low

filters:
  include_keywords:
    - market - markets - stocks - equities - bonds - yields - inflation - rates
    - Fed - ECB - earnings - guidance - oil - gold - dollar - FX - crypto
    - Bitcoin - BTC - risk - volatility
    - 投资 - 市场 - 股票 - 股市 - 美股 - 港股 - A股
    - 债券 - 利率 - 通胀 - 汇率 - 美元 - 原油 - 黄金 - 加密 - 比特币
    - piyasa - borsa - hisse - faiz - enflasyon - dolar
    - bilanço - teknik analiz - destek - direnç - hedef fiyat
    - KAP - temettü - kar - zarar - ciro - borç - nakit
  exclude_keywords:
    - giveaway - merch - birthday - vacation - meme
    - 抽奖 - 生日 - 旅行 - 表情包

accounts:
  # ════════════════════════════════════════════════════════
  # ★★★ 核心大V（Core Tier）— 每日必抓，优先级最高
  # 排名依据：内容质量 × 影响力 × 实用性 × 稳定性
  # ════════════════════════════════════════════════════════

  # 排名1：bilanço深度分析 + 目标价 + Spaces直播
  - handle: "@altinhisseler"
    name: "ALTIN HİSSELER"
    homepage: "https://x.com/altinhisseler"
    tier: core
    rank: 1
    priority: high
    notes: "BIST影响榜前列，财报拆解非常细致，常给目标价和逻辑。实用性极高。适合所有想做中线的基本面交易者。"
    enabled: true

  # 排名2：SPK持牌 + 数学工程师背景，bilanço分析极强（53万+粉丝）
  - handle: "@TuncayTursucu"
    name: "Tuncay Turşucu"
    homepage: "https://x.com/TuncayTursucu"
    tier: core
    rank: 2
    priority: high
    notes: "SPK持牌分析师，数学工程师背景，财务报表分析专业且严谨，粉丝53万+，质量稳定。重视基本面和财报的投资者必看。"
    enabled: true

  # 排名3：数据工具 + 基金持仓，最好用的BIST数据平台
  - handle: "@fintables"
    name: "Fintables"
    homepage: "https://x.com/fintables"
    tier: core
    rank: 3
    priority: high
    notes: "不是分析账号，而是最好用的数据平台。查财务数据、持仓、比率最快最全，决策前必看。适合所有人（尤其是做研究和验证的）。约40万粉丝。"
    enabled: true

  # 排名4：图形分析 + KAP资讯 + 进出场点位
  - handle: "@baymucize"
    name: "Bay Mucize"
    homepage: "https://x.com/baymucize"
    tier: core
    rank: 4
    priority: high
    notes: "技术图形做得好，同时结合KAP新闻，给具体买卖点。交易党常用。适合技术交易者、短线/波段操作者。"
    enabled: true

  # 排名5：技术 + 基本面结合，VİOP期货分析
  - handle: "@Viop_Analiz"
    name: "VİOP Analiz"
    homepage: "https://x.com/Viop_Analiz"
