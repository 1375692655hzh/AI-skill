    priority: high
    notes: "技术面和基本面结合较好，尤其适合做VİOP期货的交易者。适合期货+股票双做的投资者。"
    enabled: true

  # 排名6：潜力股跟踪 + 分析内容多
  - handle: "@Borsayolundaa"
